spring.application.name=java_semantic_website
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
spring.devtools.restart.enabled=true

# Elasticsearch
app.elasticsearch.base-url=http://localhost:9200
app.elasticsearch.semantic-index=sem_text_files
app.elasticsearch.lexical-index=lex_text_files
app.elasticsearch.snippet-length=200

# Ollama embeddings
app.ollama.embeddings-url=http://localhost:11434/api/embeddings
app.ollama.model=nomic-embed-text

# Search pagination
app.search.page-size=10
app.search.max-visible-pages=10
app.search.knn-k=50
app.search.knn-num-candidates=100
